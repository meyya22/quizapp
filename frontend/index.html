<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Xam Bridge — Free Online Quiz Maker for Teachers &amp; Trainers</title>
    <meta name="description" content="Create quizzes for your students or team in minutes. AI-powered question generation, multilingual support (Hindi, Tamil, Bengali &amp; more), analytics, and free to start. No credit card required." />
    <meta name="keywords" content="online quiz maker, quiz creator for teachers, employee training quiz, AI quiz generator, free quiz tool, MCQ maker, quiz platform" />
    <link rel="canonical" href="https://xambridge.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Xam Bridge" />
    <meta property="og:title" content="Xam Bridge — Free Online Quiz Maker for Teachers &amp; Trainers" />
    <meta property="og:description" content="Create quizzes for your students or team in minutes. AI-powered question generation, multilingual support, and free to start." />
    <meta property="og:url" content="https://xambridge.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Xam Bridge — Free Online Quiz Maker" />
    <meta name="twitter:description" content="AI-powered quiz creation for teachers &amp; trainers. Free to start, multilingual, easy to share." />

    <!-- Schema.org: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Xam Bridge",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "url": "https://xambridge.com/",
      "description": "Free online quiz maker for teachers and trainers. Create MCQ, true/false, and free-text quizzes with AI assistance. Multilingual support for Hindi, Tamil, Bengali, Telugu, Marathi, and Gujarati.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free plan available. Paid plan from $9/month."
      },
      "featureList": [
        "AI-powered question generation",
        "Multiple question types: MCQ, True/False, Multiple Response, Free Text",
        "Multilingual quiz translation",
        "Response analytics and reports",
        "CSV audience import",
        "Quiz sharing via public link"
      ]
    }
    </script>

    <!-- Schema.org: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Xam Bridge free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Xam Bridge offers a free plan that includes 5 quizzes, 10 questions per quiz, AI question generation, and 50 quiz responses. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "Does Xam Bridge support languages other than English?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Xam Bridge supports quiz translation into Hindi, Bengali, Telugu, Marathi, Tamil, and Gujarati."
          }
        },
        {
          "@type": "Question",
          "name": "Can I generate quiz questions with AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Xam Bridge uses Claude AI to generate MCQ, true/false, and other question types from a topic prompt. Free accounts get 3 generations per month; paid accounts get 25."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Xam Bridge for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Xam Bridge is designed for educators, teachers, corporate trainers, and HR teams who need to create and distribute quizzes or assessments to students or employees."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
